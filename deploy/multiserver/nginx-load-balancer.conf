upstream revibe_app {
    least_conn;
    server 10.0.1.10:80 max_fails=3 fail_timeout=30s;
    server 10.0.1.11:80 max_fails=3 fail_timeout=30s;
}
server {
    listen 80;
    server_name revibe.example.com;
    location /health.php { proxy_pass http://revibe_app; }
    location / { proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_pass http://revibe_app; }
}
