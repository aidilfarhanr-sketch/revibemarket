server {
    listen 80;
    server_name revibe.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name revibe.example.com;
    root /var/www/revibe;
    index index.php index.html;
    client_max_body_size 20M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / { try_files $uri $uri/ /index.php?$query_string; }
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
    }
    location ~ ^/(app|config|database|deploy|docs|logs|scripts|storage/private|backups|vendor)(/|$) { deny all; }
    location ~ (^|/)\. { deny all; }
    location ~* \.(env|sql|log|zip|bak|ini|conf|dump|old)$ { deny all; }
    location ~* \.(css|js|jpg|jpeg|png|webp|svg|mp4)$ { expires 30d; add_header Cache-Control "public, immutable"; }
}
