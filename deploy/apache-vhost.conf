<VirtualHost *:80>
    ServerName revibe.example.com
    Redirect permanent / https://revibe.example.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName revibe.example.com
    DocumentRoot /var/www/revibe
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/revibe.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/revibe.example.com/privkey.pem

    <Directory /var/www/revibe>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>

    <DirectoryMatch "^/var/www/revibe/(app|config|database|deploy|docs|logs|scripts|storage/private|backups|vendor)">
        Require all denied
    </DirectoryMatch>

    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    ErrorLog ${APACHE_LOG_DIR}/revibe_error.log
    CustomLog ${APACHE_LOG_DIR}/revibe_access.log combined
</VirtualHost>
